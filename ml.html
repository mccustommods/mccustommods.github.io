<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modloaders | Minecraft</title>
    <script>

        const theme = localStorage.getItem('theme') || 'darkify';
        const backgrounds = {
            greenify: 'radial-gradient(circle at top right, #1a4d1a, #0f3d0f, #051a05)',
            bluedify: 'radial-gradient(circle at top right, #102a43, #0a192f, #020c1b)',
            darkify: 'radial-gradient(circle at top right, #1a1a1a, #0d0d0d, #000000)',
            whitify: 'radial-gradient(circle at top right, #e6e6e6, #f2f2f2, #ffffff)'
        };
        window.backgrounds = backgrounds;
        document.write(`<link id="theme-css" rel="stylesheet" href="ui/${theme}/ml.css">`);
        document.write(`<style>body { background: ${backgrounds[theme]} !important; }</style>`);
    </script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html">Main</a>
            <a href="modpacks.html">Modpacks</a>
            <a href="sp.html">Shaders</a>
            <a href="rtp.html">Resourse/texture pack</a>
            <a href="ml.html">Modloaders</a>
            <a href="au.html">About Us</a>
        </div>
    </nav>

    <script>
    function switchTheme(theme) {
        localStorage.setItem('theme', theme);
        document.getElementById('theme-css').href = 'ui/' + theme + '/ml.css';
        document.body.style.background = window.backgrounds[theme];
        updateActiveOption();
        closeThemeModal();
    }

    function toggleThemeModal() {
        const modal = document.getElementById('themeModal');
        const overlay = document.getElementById('themeOverlay');
        modal.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    function closeThemeModal() {
        const modal = document.getElementById('themeModal');
        const overlay = document.getElementById('themeOverlay');
        modal.classList.remove('active');
        overlay.classList.remove('active');
    }

    function updateActiveOption() {
        const activeTheme = localStorage.getItem('theme') || 'darkify';
        document.querySelectorAll('.theme-option').forEach(option => {
            option.classList.remove('active');
            if (option.textContent.toLowerCase() === activeTheme.replace('ify', '')) {
                option.classList.add('active');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        updateActiveOption();
        
        document.getElementById('themeIcon').addEventListener('click', toggleThemeModal);
        document.getElementById('themeOverlay').addEventListener('click', closeThemeModal);
    });
    </script>

    <div class="ml-container">
        <header class="ml-header">
            <h1>Download Modloaders</h1>
            <p>Ensure you have the correct engine to run your modpacks.</p>
        </header>

        <div class="ml-grid">
            <div class="ml-card">
                <h2>Forge</h2>
                <span class="ml-ver">1.20.1</span>
                <a href="https://files.minecraftforge.net/net/minecraftforge/forge/index_1.20.1.html" class="ml-btn">Download Installer</a>
            </div>
            <div class="ml-card">
                <h2>NeoForge</h2>
                <span class="ml-ver">1.21.1</span>
                <a href="https://neoforged.net/" class="ml-btn">Download Installer</a>
            </div>
            <div class="ml-card">
                <h2>Fabric</h2>
                <span class="ml-ver">1.21.1</span>
                <a href="https://fabricmc.net/" class="ml-btn">Download Installer</a>
            </div>
            </div>
            <div class="ml-card">
                <h2>Fabric</h2>
                <span class="ml-ver">1.21</span>
                <a href="https://fabricmc.net/" class="ml-btn">Download Installer</a>
            </div>
        </div>
    </div>

<div class="theme-modal-overlay" id="themeOverlay"></div>
<div class="theme-icon" id="themeIcon">⚙️</div>
<div class="theme-modal" id="themeModal">
    <h3>Choose Theme</h3>
    <button class="theme-option" onclick="switchTheme('greenify')">Green</button>
    <button class="theme-option" onclick="switchTheme('bluedify')">Blue</button>
    <button class="theme-option" onclick="switchTheme('darkify')">Dark</button>
    <button class="theme-option" onclick="switchTheme('whitify')">White</button>
</div>
</body>
</html>
