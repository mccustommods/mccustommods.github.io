    <script>

        const theme = localStorage.getItem('theme') || 'darkify';
        const backgrounds = {
            greenify: 'radial-gradient(circle at top right, #1a4d1a, #0f3d0f, #051a05)',
            bluedify: 'radial-gradient(circle at top right, #102a43, #0a192f, #020c1b)',
            darkify: 'radial-gradient(circle at top right, #1a1a1a, #0d0d0d, #000000)',
            whitify: 'radial-gradient(circle at top right, #e6e6e6, #f2f2f2, #ffffff)'
        };
        window.backgrounds = backgrounds;
        document.write(`<link id="theme-css" rel="stylesheet" href="ui/${theme}/au.css">`);
        document.write(`<style>body { background: ${backgrounds[theme]} !important; }</style>`);
    </script>

<script>
function switchTheme(theme) {
    localStorage.setItem('theme', theme);
    document.getElementById('theme-css').href = 'ui/' + theme + '/au.css';
    document.body.style.background = window.backgrounds[theme];
    updateActiveOption();
    closeThemeModal();
}

function toggleThemeModal() {
    const modal = document.getElementById('themeModal');
    const overlay = document.getElementById('themeOverlay');
    modal.classList.toggle('active');
    overlay.classList.toggle('active');
}

function closeThemeModal() {
    const modal = document.getElementById('themeModal');
    const overlay = document.getElementById('themeOverlay');
    modal.classList.remove('active');
    overlay.classList.remove('active');
}

function updateActiveOption() {
    const activeTheme = localStorage.getItem('theme') || 'darkify';
    document.querySelectorAll('.theme-option').forEach(option => {
        option.classList.remove('active');
        if (option.textContent.toLowerCase() === activeTheme.replace('ify', '')) {
            option.classList.add('active');
        }
    });
}

document.addEventListener('DOMContentLoaded', function() {
    updateActiveOption();
    
    document.getElementById('themeIcon').addEventListener('click', toggleThemeModal);
    document.getElementById('themeOverlay').addEventListener('click', closeThemeModal);
});
</script>
